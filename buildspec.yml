version: 0.2

env:
  parameter-store:
    SONAR_TOKEN: "/indira-aws-pipeline/sonar-token"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - curl -sSLo /tmp/sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-8.0.1.6346-linux-x64.zip
      - unzip -q /tmp/sonar-scanner.zip -d /opt
  pre_build:
    commands:
      - pip install -r requirements.txt
  build:
    commands:
      - /opt/sonar-scanner-8.0.1.6346-linux-x64/bin/sonar-scanner -Dsonar.projectKey=indira_aws_pipeline -Dsonar.sources=. -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.token=$SONAR_TOKEN -Dsonar.qualitygate.wait=true
